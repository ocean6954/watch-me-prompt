<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https: http://localhost:*; font-src 'self'">
<title>watch-me-prompt</title>
<style>

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-hover: #1a1a25;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-muted: #6a6a80;
    --accent: #4af;
    --accent-dim: #4af3;
    --green: #4d8;
    --amber: #fa4;
    --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    --sans: system-ui, -apple-system, 'Segoe UI', 'Hiragino Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    animation: slideDown 0.4s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header h1 {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--accent);
  }

  .header h1 span { color: var(--text-muted); font-weight: 300; }

  .stats {
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .stats strong { color: var(--text); font-weight: 500; }

  /* Controls */
  .controls {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.5s ease 0.1s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .controls input, .controls select {
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .controls input:focus, .controls select:focus {
    border-color: var(--accent);
  }

  .controls input { width: 280px; }
  .controls select { cursor: pointer; }

  .controls select option { background: var(--surface); }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 16px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }

  .refresh-btn:hover { background: var(--accent); color: var(--bg); }

  /* Tree */
  .tree-wrap {
    padding: 20px 32px;
    animation: fadeIn 0.5s ease 0.2s both;
  }

  .tree-node {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 4px;
    overflow: hidden;
  }

  .tree-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    border: none;
    width: 100%;
    text-align: left;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
  }

  .tree-toggle:hover { background: var(--surface-hover); }

  .tree-arrow {
    display: inline-block;
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
    width: 12px;
    text-align: center;
    flex-shrink: 0;
  }

  .tree-node.open > .tree-toggle .tree-arrow { transform: rotate(90deg); }

  .tree-icon {
    font-size: 14px;
    flex-shrink: 0;
  }

  .tree-label {
    font-weight: 500;
  }

  .tree-count {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .tree-children {
    display: none;
    padding-left: 20px;
  }

  .tree-node.open > .tree-children { display: block; }

  /* Project node nested */
  .tree-children .tree-node {
    border-left: none;
    border-right: none;
    border-radius: 0;
    margin-bottom: 0;
  }

  .tree-children .tree-node:last-child { border-bottom: none; }

  .tree-children .tree-toggle {
    background: transparent;
    padding: 8px 16px;
  }

  /* Prompt items */
  .prompt-list {
    display: none;
    padding: 0 16px 8px 42px;
  }

  .tree-node.open > .prompt-list { display: block; }

  .prompt-item {
    padding: 10px 14px;
    border-left: 2px solid var(--border);
    margin-bottom: 6px;
    transition: border-color 0.2s;
    animation: rowIn 0.3s ease both;
  }

  .prompt-item:hover { border-left-color: var(--accent); }

  .prompt-text {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .prompt-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .tag-project {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  .tag-user {
    color: var(--green);
    font-size: 12px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-muted);
    font-size: 14px;
    animation: fadeIn 0.4s ease;
  }

  .empty .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Row animation */
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  tbody tr {
    animation: rowIn 0.3s ease both;
  }
</style>
</head>
<body>

<div class="header">
  <h1>watch-me-prompt <span>/ dashboard</span></h1>
  <div class="stats">
    <div>prompts: <strong id="total-count">-</strong></div>
    <div>projects: <strong id="project-count">-</strong></div>
    <div>users: <strong id="user-count">-</strong></div>
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search prompts...">
  <select id="filter-project"><option value="">All projects</option></select>
  <select id="filter-user"><option value="">All users</option></select>
  <button class="refresh-btn" onclick="fetchData()">Refresh</button>
</div>

<div class="tree-wrap">
  <div id="loading" class="loading">Loading</div>
  <div id="tree" style="display:none"></div>
  <div id="empty" class="empty" style="display:none">
    <div class="icon">&gt;_</div>
    <div>No prompts found</div>
  </div>
</div>

<script>
const API = '__API_URL__';

let allItems = [];

async function fetchData() {
  const loading = document.getElementById('loading');
  const tree = document.getElementById('tree');
  const empty = document.getElementById('empty');

  loading.style.display = 'block';
  tree.style.display = 'none';
  empty.style.display = 'none';

  try {
    const res = await fetch(API);
    const data = await res.json();
    allItems = data.items || [];

    document.getElementById('total-count').textContent = allItems.length;
    const projects = [...new Set(allItems.map(i => i.project))];
    const users = [...new Set(allItems.map(i => i.user))];
    document.getElementById('project-count').textContent = projects.length;
    document.getElementById('user-count').textContent = users.length;

    populateFilter('filter-project', projects);
    populateFilter('filter-user', users);

    render();
  } catch (e) {
    loading.textContent = 'Failed to load: ' + e.message;
  }
}

function populateFilter(id, values) {
  const select = document.getElementById(id);
  const current = select.value;
  const label = id === 'filter-project' ? 'All projects' : 'All users';
  select.innerHTML = '<option value="">' + label + '</option>';
  values.sort().forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    select.appendChild(opt);
  });
  select.value = current;
}

function filterItems() {
  const search = document.getElementById('search').value.toLowerCase();
  const project = document.getElementById('filter-project').value;
  const user = document.getElementById('filter-user').value;

  return allItems.filter(item => {
    if (project && item.project !== project) return false;
    if (user && item.user !== user) return false;
    if (search && !item.prompt.toLowerCase().includes(search) &&
        !item.project.toLowerCase().includes(search) &&
        !item.user.toLowerCase().includes(search)) return false;
    return true;
  });
}

function buildTree(items) {
  const tree = {};
  items.forEach(item => {
    const u = item.user || 'unknown';
    const p = item.project || 'unknown';
    if (!tree[u]) tree[u] = {};
    if (!tree[u][p]) tree[u][p] = [];
    tree[u][p].push(item);
  });
  // Sort prompts by date descending within each group
  for (const u of Object.keys(tree)) {
    for (const p of Object.keys(tree[u])) {
      tree[u][p].sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    }
  }
  return tree;
}

function render() {
  const items = filterItems();
  const loading = document.getElementById('loading');
  const treeEl = document.getElementById('tree');
  const empty = document.getElementById('empty');

  loading.style.display = 'none';

  if (items.length === 0) {
    treeEl.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  treeEl.style.display = 'block';
  empty.style.display = 'none';

  const tree = buildTree(items);
  const users = Object.keys(tree).sort();

  treeEl.innerHTML = users.map(user => {
    const projects = Object.keys(tree[user]).sort();
    const userCount = projects.reduce((sum, p) => sum + tree[user][p].length, 0);

    const projectNodes = projects.map(project => {
      const prompts = tree[user][project];
      const promptItems = prompts.map((item, i) =>
        '<div class="prompt-item" style="animation-delay: ' + Math.min(i * 30, 300) + 'ms">' +
          '<div class="prompt-text">' + esc(item.prompt) + '</div>' +
          '<div class="prompt-meta">' + formatDate(item.createdAt) + '</div>' +
        '</div>'
      ).join('');

      return '<div class="tree-node">' +
        '<button class="tree-toggle" onclick="toggle(this)">' +
          '<span class="tree-arrow">&#9654;</span>' +
          '<span class="tree-icon">&#128196;</span>' +
          '<span class="tree-label"><span class="tag-project">' + esc(project) + '</span></span>' +
          '<span class="tree-count">' + prompts.length + ' prompts</span>' +
        '</button>' +
        '<div class="prompt-list">' + promptItems + '</div>' +
      '</div>';
    }).join('');

    return '<div class="tree-node">' +
      '<button class="tree-toggle" onclick="toggle(this)">' +
        '<span class="tree-arrow">&#9654;</span>' +
        '<span class="tree-icon">&#128100;</span>' +
        '<span class="tree-label"><span class="tag-user">' + esc(user) + '</span></span>' +
        '<span class="tree-count">' + userCount + ' prompts</span>' +
      '</button>' +
      '<div class="tree-children">' + projectNodes + '</div>' +
    '</div>';
  }).join('');
}

function toggle(btn) {
  btn.parentElement.classList.toggle('open');
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

// Filters
document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-project').addEventListener('change', render);
document.getElementById('filter-user').addEventListener('change', render);

// Init
fetchData();
</script>

</body>
</html>
